services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: mfgcost-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "MfgCost@2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - mfgcost-net

networks:
  mfgcost-net:
    name: mfgcost-net

volumes:
  mssql-data:
    name: mfgcost-mssql-data
