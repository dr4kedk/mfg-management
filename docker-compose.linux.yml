services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mfgcost-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "MfgCost@2026!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'MfgCost@2026!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mfgcost-net

networks:
  mfgcost-net:
    name: mfgcost-net

volumes:
  mssql-data:
    name: mfgcost-mssql-data
